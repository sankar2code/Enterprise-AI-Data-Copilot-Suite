<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="960" height="640" role="img" aria-labelledby="t d">
<title id="t">Enterprise AI Data Copilot Suite — system architecture</title>
<desc id="d">Six layers from interface down to storage. An n8n supervisor routes over an MCP bridge to four stateless Langflow agents, each backed by a deterministic engine. A semantic layer fed by pluggable domain packs sits above a control plane and a read-only data plane. Audit, RBAC and observability span all layers.</desc>

